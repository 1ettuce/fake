<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes, viewport-fit=cover" />
    <title>Binance</title>
    <meta name="apple-mobile-web-app-title" content="Binance" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png" />
    <style>
        html {
            min-height: calc(100% + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        img {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
            transition: opacity 0.6s ease;
        }

        .fade {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
        }

        body {
            -webkit-touch-callout: none;
        }

        .change-image-button {
            position: absolute;
            bottom: 20px;
            right: 5px;
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.8);
            opacity: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .change-image-button:hover {
            background-color: rgba(255, 255, 255, 1);
        }

        /* ── Face ID Overlay ── */
        #faceid-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #faceid-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .faceid-box {
            position: relative;
            width: 180px;
            height: 220px;
        }

        /* 4 corner brackets */
        .corner {
            position: absolute;
            width: 28px;
            height: 28px;
        }
        .corner::before,
        .corner::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 1px;
        }
        .corner::before { width: 3px; height: 100%; }
        .corner::after  { width: 100%; height: 3px; }

        .corner.tl { top: 0; left: 0; }
        .corner.tl::before { top: 0; left: 0; }
        .corner.tl::after  { top: 0; left: 0; }

        .corner.tr { top: 0; right: 0; transform: scaleX(-1); }
        .corner.tr::before { top: 0; left: 0; }
        .corner.tr::after  { top: 0; left: 0; }

        .corner.bl { bottom: 0; left: 0; transform: scaleY(-1); }
        .corner.bl::before { top: 0; left: 0; }
        .corner.bl::after  { top: 0; left: 0; }

        .corner.br { bottom: 0; right: 0; transform: scale(-1); }
        .corner.br::before { top: 0; left: 0; }
        .corner.br::after  { top: 0; left: 0; }

        /* Scan line */
        .scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #00d4ff 30%, #ffffff 50%, #00d4ff 70%, transparent 100%);
            box-shadow: 0 0 10px #00d4ff, 0 0 20px rgba(0, 212, 255, 0.5);
            border-radius: 2px;
            animation: scanMove 2s ease-in-out infinite;
        }

        @keyframes scanMove {
            0%   { top: 8px;  opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: calc(100% - 10px); opacity: 0; }
        }

        /* Face outline - oval */
        .face-oval {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 120px;
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 50%;
        }

        /* Dot grid */
        .dot-grid {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: 50%;
        }

        .dot-grid canvas {
            width: 100%;
            height: 100%;
        }

        /* Glow pulse on success */
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 0px rgba(0,212,255,0); }
            50%       { box-shadow: 0 0 24px 8px rgba(0,212,255,0.45); }
        }

        .faceid-box.success .face-oval {
            border-color: rgba(0, 212, 255, 0.7);
            animation: glowPulse 0.8s ease 2;
        }

        .faceid-box.success .scan-line {
            display: none;
        }

        /* Checkmark */
        .check-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 212, 255, 0.15);
            border: 2px solid #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .check-circle svg {
            width: 22px;
            height: 22px;
            stroke: #00d4ff;
            stroke-width: 2.5;
            fill: none;
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            transition: stroke-dashoffset 0.4s ease 0.15s;
        }

        .faceid-box.success .check-circle {
            transform: translate(-50%, -50%) scale(1);
        }

        .faceid-box.success .check-circle svg {
            stroke-dashoffset: 0;
        }

        /* Label */
        .faceid-label {
            margin-top: 24px;
            color: rgba(255,255,255,0.85);
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-align: center;
        }

        .faceid-sub {
            margin-top: 6px;
            color: rgba(255,255,255,0.45);
            font-family: -apple-system, 'SF Pro Text', sans-serif;
            font-size: 12px;
            text-align: center;
        }
    </style>

    <script>
        let currentImage = 0;
        let firstTime = true;
        const images = ['image.png', 'image2.png', 'image3.png', 'image4.png', 'image5.png'];

        document.addEventListener('touchmove', function(event) {
            event.preventDefault();
        }, { passive: false });

        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = new Date().getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        function changeImage(arg) {
            currentImage = arg;
            document.getElementById('main-image').src = images[currentImage];
        }

        /* ── Face ID logic ── */
        function showFaceID() {
            const overlay = document.getElementById('faceid-overlay');
            overlay.classList.add('visible');
            drawDots();

            // Simulate scan completing after 2.6s
            setTimeout(() => {
                const box = document.querySelector('.faceid-box');
                box.classList.add('success');
                document.querySelector('.faceid-label').textContent = '인증 완료';

                // Hide after success
                setTimeout(() => {
                    overlay.style.transition = 'opacity 0.5s ease';
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.classList.remove('visible');
                        overlay.style.opacity = '';
                        // Reset for next time
                        box.classList.remove('success');
                        document.querySelector('.faceid-label').textContent = 'Face ID로 잠금 해제';
                    }, 500);
                }, 900);
            }, 2600);
        }

        function drawDots() {
            const canvas = document.getElementById('dot-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const W = canvas.width  = canvas.offsetWidth;
            const H = canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, W, H);
            const cols = 10, rows = 12;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const x = (c + 0.5) * (W / cols);
                    const y = (r + 0.5) * (H / rows);
                    const alpha = 0.15 + Math.random() * 0.4;
                    ctx.beginPath();
                    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 212, 255, ${alpha})`;
                    ctx.fill();
                }
            }
        }

        window.onload = function() {
            const mainImage = document.getElementById('main-image');
            const imgElement4 = document.getElementById('image4');
            const imgElement5 = document.getElementById('image5');

            imgElement4.src = images[3];
            imgElement5.src = images[4];
            mainImage.src = images[0];

            mainImage.style.transition = 'none';
            mainImage.style.opacity = 0;

            imgElement4.style.opacity = 1;

            setTimeout(() => {
                imgElement4.style.opacity = 0;
                imgElement5.style.opacity = 1;

                setTimeout(() => {
                    imgElement5.style.transition = 'none';
                    imgElement5.style.opacity = 0;
                    mainImage.style.opacity = 1;

                    // Show Face ID after image transition
                    setTimeout(() => {
                        showFaceID();
                    }, 400);
                }, 2000);
            }, 1000);
        };
    </script>
</head>
<body>
    <div class="image-container">
        <img id="image4" class="fade" alt="Image 4">
        <img id="image5" class="fade" alt="Image 5">
        <img id="main-image" src="image.png" alt="Main Image">
    </div>
    <div class="change-image-button" onclick="changeImage(1)">⬅️</div>
    <div class="change-image-button" style="left: 5px;" onclick="changeImage(0)">➡️</div>

    <!-- Face ID Overlay -->
    <div id="faceid-overlay">
        <div class="faceid-box">
            <!-- Corner brackets -->
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <!-- Face oval with dot grid -->
            <div class="face-oval">
                <div class="dot-grid">
                    <canvas id="dot-canvas"></canvas>
                </div>
            </div>

            <!-- Scan line -->
            <div class="scan-line"></div>

            <!-- Success checkmark -->
            <div class="check-circle">
                <svg viewBox="0 0 24 24">
                    <polyline points="4,12 9,17 20,7"/>
                </svg>
            </div>
        </div>

        <div class="faceid-label">Face ID로 잠금 해제</div>
        <div class="faceid-sub">위를 바라보세요</div>
    </div>
</body>
</html>
