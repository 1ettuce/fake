<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes, viewport-fit=cover" />
    <title>Binance</title>
    <meta name="apple-mobile-web-app-title" content="Binance" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png" />
    <style>
        html {
            min-height: calc(100% + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        img, video {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
            transition: opacity 0.6s ease;
        }

        video {
            object-fit: contain;
            object-position: top;
            background-color: transparent;
        }

        .fade {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            z-index: 1;
        }

        #transition-video {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: none;
            width: 100vw;
            height: auto;
            object-fit: fill;
            z-index: 5;
        }

        #main-image-a,
        #main-image-b {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            transition: opacity 0.4s ease;
        }

        body {
            -webkit-touch-callout: none;
        }

        .button-bar {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 6px;
            z-index: 10;
        }

        .change-image-button {
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.8);
            opacity: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            font-size: 12px;
            font-weight: bold;
            color: #333;
        }

        .change-image-button:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
    <script>
        let currentImage = 0;
        let activeLayer = 'a';
        let isSwitching = false;
        const images = ['image.png', 'imageA.png', 'imageB.png', 'imageC.png', 'imageD.png'];

        // 페이지 로드 시 모든 버튼용 이미지 미리 캐시
        const preloadCache = {};
        function preloadAll() {
            images.forEach((src, i) => {
                const img = new Image();
                img.src = src;
                preloadCache[src] = img;
            });
        }

        document.addEventListener('touchmove', function(event) {
            event.preventDefault();
        }, { passive: false });

        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = new Date().getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        function changeImage(arg) {
            if (currentImage === arg || isSwitching) return;
            isSwitching = true;
            currentImage = arg;

            const layerA = document.getElementById('main-image-a');
            const layerB = document.getElementById('main-image-b');
            const nextLayer = activeLayer === 'a' ? layerB : layerA;
            const prevLayer = activeLayer === 'a' ? layerA : layerB;

            const targetSrc = images[currentImage];
            const cached = preloadCache[targetSrc];

            function doSwitch() {
                // 다음 레이어에 이미지 세팅 (transition 없이 opacity 0으로)
                nextLayer.style.transition = 'none';
                nextLayer.style.opacity = 0;
                nextLayer.src = targetSrc;

                // 한 프레임 뒤에 transition 켜고 크로스페이드
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        nextLayer.style.transition = 'opacity 0.4s ease';
                        nextLayer.style.opacity = 1;
                        prevLayer.style.transition = 'opacity 0.4s ease';
                        prevLayer.style.opacity = 0;
                        activeLayer = activeLayer === 'a' ? 'b' : 'a';
                        setTimeout(() => { isSwitching = false; }, 400);
                    });
                });
            }

            // 캐시된 이미지가 완전히 로드됐으면 바로, 아니면 onload 후 실행
            if (cached && cached.complete && cached.naturalWidth > 0) {
                doSwitch();
            } else if (cached) {
                cached.onload = doSwitch;
            } else {
                doSwitch();
            }
        }

        window.onload = function() {
            // 모든 버튼용 이미지 미리 로드
            preloadAll();

            const layerA = document.getElementById('main-image-a');
            const layerB = document.getElementById('main-image-b');
            const imgElement4 = document.getElementById('image4');
            const imgElement5 = document.getElementById('image5');
            const transitionVideo = document.getElementById('transition-video');

            imgElement4.src = 'image4.png';
            imgElement5.src = 'image5.png';

            layerA.src = images[0];
            layerA.style.transition = 'none';
            layerA.style.opacity = 0;
            layerB.style.opacity = 0;
            activeLayer = 'a';

            transitionVideo.addEventListener('ended', () => {
                transitionVideo.style.opacity = 0;
            });

            imgElement4.style.opacity = 1;

            setTimeout(() => {
                imgElement4.style.opacity = 0;
                imgElement5.style.opacity = 1;

                setTimeout(() => {
                    transitionVideo.style.opacity = 1;

                    transitionVideo.addEventListener('playing', () => {
                        setTimeout(() => {
                            layerA.style.transition = 'none';
                            layerA.style.opacity = 1;
                            imgElement5.style.transition = 'none';
                            imgElement5.style.opacity = 0;
                            setTimeout(() => {
                                layerA.style.transition = 'opacity 0.4s ease';
                            }, 50);
                        }, 520);
                    }, { once: true });

                    transitionVideo.play().catch(() => {
                        imgElement5.style.transition = 'none';
                        imgElement5.style.opacity = 0;
                        transitionVideo.style.opacity = 0;
                        layerA.style.opacity = 1;
                        setTimeout(() => {
                            layerA.style.transition = 'opacity 0.4s ease';
                        }, 50);
                    });
                }, 2000);
            }, 1000);
        };
    </script>
</head>
<body>
    <div class="image-container">
        <img id="image4" class="fade" alt="Image 4">
        <img id="image5" class="fade" alt="Image 5">

        <video id="transition-video" muted playsinline preload="auto">
            <source src="transition.mp4" type="video/mp4">
            <source src="transition.webm" type="video/webm">
        </video>

        <img id="main-image-a" src="image.png" alt="Main Image A">
        <img id="main-image-b" src="" alt="Main Image B" style="opacity:0;">
    </div>

    <div class="button-bar">
        <div class="change-image-button" onclick="changeImage(0)">image</div>
        <div class="change-image-button" onclick="changeImage(1)">A</div>
        <div class="change-image-button" onclick="changeImage(2)">B</div>
        <div class="change-image-button" onclick="changeImage(3)">C</div>
        <div class="change-image-button" onclick="changeImage(4)">D</div>
    </div>
</body>
</html>
