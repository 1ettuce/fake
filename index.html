<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes, viewport-fit=cover" />
    <title>Binance</title>
    <meta name="apple-mobile-web-app-title" content="Binance" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png" />
    <style>
        html {
            min-height: calc(100% + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #202630;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        img, video {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
            transition: opacity 0.6s ease;
        }

        video {
            object-fit: contain;
            object-position: top;
            background-color: transparent;
        }

        .fade {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            z-index: 1;
        }

        #transition-video {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: none;
            width: 100vw;
            height: auto;
            object-fit: fill;
            z-index: 5;
        }

        #main-image {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        body {
            -webkit-touch-callout: none;
        }

        .change-image-button {
            position: absolute;
            bottom: 20px;
            right: 5px;
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.8);
            opacity: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .change-image-button:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
    <script>
        let currentImage = 0;
        const images = ['image.png', 'image2.png', 'image3.png', 'image4.png', 'image5.png'];

        document.addEventListener('touchmove', function(event) {
            event.preventDefault();
        }, { passive: false });

        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = new Date().getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 모든 이미지를 미리 로드해두는 캐시
        const imageCache = {};

        function preloadImages() {
            images.forEach(src => {
                const img = new Image();
                img.src = src;
                imageCache[src] = img;
            });
        }

        function changeImage(arg) {
            const mainImage = document.getElementById('main-image');
            const backImage = document.getElementById('back-image');
            currentImage = arg;
            const newSrc = images[currentImage];

            // 이미 캐시된 이미지를 back에 세팅 (이미 로드 완료 상태)
            backImage.style.transition = 'none';
            backImage.src = newSrc;
            backImage.style.opacity = 1;

            // main을 즉시 페이드아웃 (back은 이미 깔려 있음)
            mainImage.style.transition = 'opacity 0.15s ease';
            mainImage.style.opacity = 0;

            setTimeout(() => {
                mainImage.style.transition = 'none';
                mainImage.src = newSrc;
                mainImage.style.opacity = 1;
                backImage.style.opacity = 0;
            }, 160);
        }

        window.onload = function() {
            preloadImages(); // 모든 이미지 미리 로드
            const mainImage = document.getElementById('main-image');
            const imgElement4 = document.getElementById('image4');
            const imgElement5 = document.getElementById('image5');
            const transitionVideo = document.getElementById('transition-video');

            imgElement4.src = images[3];
            imgElement5.src = images[4];
            mainImage.src = images[0];

            mainImage.style.transition = 'none';
            mainImage.style.opacity = 0;

            // 영상 종료 시 영상만 숨김 (main-image는 이미 0.3초 뒤에 표시됨)
            transitionVideo.addEventListener('ended', () => {
                transitionVideo.style.opacity = 0;
            });

            // Step 1: image4 즉시 표시 (페이드 없이)
            imgElement4.style.transition = 'none';
            imgElement4.style.opacity = 1;

            setTimeout(() => {
                // Step 2: image4 → image5 전환 (transition 복원 후 페이드)
                imgElement4.style.transition = '';
                imgElement5.style.transition = '';
                imgElement4.style.opacity = 0;
                imgElement5.style.opacity = 1;

                setTimeout(() => {
                    // Step 3: 영상 올리고 재생
                    transitionVideo.style.opacity = 1;

                    transitionVideo.addEventListener('playing', () => {
                        // image5는 그대로 유지 (영상 뒤 빈 공간에서 보임)
                        // 0.3초 후 main-image로 교체 (영상 뒤에서 자연스럽게)
                        setTimeout(() => {
                            mainImage.style.transition = 'none';
                            mainImage.style.opacity = 1;
                            imgElement5.style.transition = 'none';
                            imgElement5.style.opacity = 0;
                        }, 520);
                    }, { once: true });

                    transitionVideo.play().catch(() => {
                        // 재생 실패 fallback
                        imgElement5.style.transition = 'none';
                        imgElement5.style.opacity = 0;
                        transitionVideo.style.opacity = 0;
                        mainImage.style.opacity = 1;
                    });
                }, 2000);
            }, 1000);
        };
    </script>
</head>
<body>
    <div class="image-container">
        <img id="image4" class="fade" alt="Image 4">
        <img id="image5" class="fade" alt="Image 5">

        <video id="transition-video" muted playsinline preload="auto">
            <source src="transition.mp4" type="video/mp4">
            <source src="transition.webm" type="video/webm">
        </video>

        <img id="back-image" class="fade" alt="Back Image" style="z-index: 2;">
        <img id="main-image" alt="Main Image" style="z-index: 3; opacity: 0;">
    </div>
    <div class="change-image-button" onclick="changeImage(1)">⬅️</div>
    <div class="change-image-button" style="left: 5px;" onclick="changeImage(0)">➡️</div>
</body>
</html>
