<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes, viewport-fit=cover" />
    <title>Binance</title>
    <meta name="apple-mobile-web-app-title" content="Binance" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png" />
    <style>
        html {
            min-height: calc(100% + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        img {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
            transition: opacity 0.6s ease;
        }

        .fade {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
        }

        #transition-video {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: calc(100vw * 500 / 1180);
            object-fit: fill;
            pointer-events: none;
            opacity: 0;
            transition: none;
            z-index: 5;
        }

        body {
            -webkit-touch-callout: none;
        }

        .change-image-button {
            position: absolute;
            bottom: 20px;
            right: 5px;
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.8);
            opacity: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .change-image-button:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
    <script>
        let currentImage = 0;
        const images = ['image.png', 'image2.png', 'image3.png', 'image4.png', 'image5.png'];

        document.addEventListener('touchmove', function(event) {
            event.preventDefault();
        }, { passive: false });

        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = new Date().getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        function changeImage(arg) {
            currentImage = arg;
            document.getElementById('main-image').src = images[currentImage];
        }

        window.onload = function() {
            const mainImage = document.getElementById('main-image');
            const imgElement4 = document.getElementById('image4');
            const imgElement5 = document.getElementById('image5');
            const transitionVideo = document.getElementById('transition-video');

            imgElement4.src = images[3];
            imgElement5.src = images[4];
            mainImage.src = images[0];

            // 영상 종료 시 → 영상 숨기고 image5 페이드아웃 → main-image 노출
            transitionVideo.addEventListener('ended', () => {
                transitionVideo.style.opacity = 0;
                imgElement5.style.transition = 'opacity 0.6s ease';
                imgElement5.style.opacity = 0;
            });

            // Step 1: image4 페이드인
            imgElement4.style.opacity = 1;

            setTimeout(() => {
                // Step 2: image4 → image5 전환
                imgElement4.style.opacity = 0;
                imgElement5.style.opacity = 1;

                setTimeout(() => {
                    // Step 3: 영상 재생 (image5는 그대로 유지)
                    transitionVideo.style.opacity = 1;

                    transitionVideo.play().catch(() => {
                        // 재생 실패 시 fallback
                        transitionVideo.style.opacity = 0;
                        imgElement5.style.transition = 'opacity 0.6s ease';
                        imgElement5.style.opacity = 0;
                    });
                }, 2000);
            }, 1000);
        };
    </script>
</head>
<body>
    <div class="image-container">
        <img id="main-image" src="image.png" alt="Main Image">
        <img id="image4" class="fade" alt="Image 4">
        <img id="image5" class="fade" alt="Image 5">

        <video id="transition-video" muted playsinline preload="auto">
            <source src="transition.mp4" type="video/mp4">
            <source src="transition.webm" type="video/webm">
        </video>
    </div>
    <div class="change-image-button" onclick="changeImage(1)">⬅️</div>
    <div class="change-image-button" style="left: 5px;" onclick="changeImage(0)">➡️</div>
</body>
</html>
