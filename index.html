<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=yes, viewport-fit=cover" />
    <title>Binance</title>
    <meta name="apple-mobile-web-app-title" content="Binance" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png" />
    <style>
        html {
            min-height: calc(100% + env(safe-area-inset-top));
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        img, video {
            display: block;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
            transition: opacity 0.6s ease;
        }

        .fade {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
        }

        #transition-video {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: none;
        }

        body {
            -webkit-touch-callout: none;
        }

        .change-image-button {
            position: absolute;
            bottom: 20px;
            right: 5px;
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.8);
            opacity: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .change-image-button:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
    <script>
        let currentImage = 0;
        const images = ['image.png', 'image2.png', 'image3.png', 'image4.png', 'image5.png'];

        // 스크롤 방지
        document.addEventListener('touchmove', function(event) {
            event.preventDefault();
        }, { passive: false });

        // 컨텍스트 메뉴 방지
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        // 더블탭 줌 방지
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = new Date().getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        function changeImage(arg) {
            currentImage = arg;
            document.getElementById('main-image').src = images[currentImage];
        }

        window.onload = function() {
            const mainImage = document.getElementById('main-image');
            const imgElement4 = document.getElementById('image4');
            const imgElement5 = document.getElementById('image5');
            const transitionVideo = document.getElementById('transition-video');

            imgElement4.src = images[3];
            imgElement5.src = images[4];
            mainImage.src = images[0];

            mainImage.style.transition = 'none';
            mainImage.style.opacity = 0;

            // 영상 종료 시 main-image 표시
            transitionVideo.addEventListener('ended', () => {
                transitionVideo.style.opacity = 0;
                mainImage.style.opacity = 1;
            });

            // ── 핵심: 타임아웃 대신 두 조건이 모두 충족될 때 재생 ──
            // 1) 영상 버퍼링 완료  2) image5 표시 완료
            // 둘 다 충족되는 순간 즉시 재생 → 숫자 조정 불필요
            let videoReady = false;
            let image5Shown = false;

            function playTransition() {
                if (!videoReady || !image5Shown) return;

                transitionVideo.style.opacity = 1;

                // 첫 프레임 렌더링 시점에 image5 제거 → 깜빡임 방지
                transitionVideo.addEventListener('playing', () => {
                    imgElement5.style.transition = 'none';
                    imgElement5.style.opacity = 0;
                }, { once: true });

                transitionVideo.play().catch(() => {
                    // fallback: 영상 실패 시 바로 image0 표시
                    imgElement5.style.transition = 'none';
                    imgElement5.style.opacity = 0;
                    transitionVideo.style.opacity = 0;
                    mainImage.style.opacity = 1;
                });
            }

            // 영상 버퍼링 완료 이벤트
            transitionVideo.addEventListener('canplaythrough', () => {
                videoReady = true;
                playTransition();
            }, { once: true });

            // 이미 캐시된 경우 즉시 처리
            if (transitionVideo.readyState >= 3) {
                videoReady = true;
            }
            // ────────────────────────────────────────────────────────

            // Step 1: image4 페이드인
            imgElement4.style.opacity = 1;

            setTimeout(() => {
                // Step 2: image4 → image5
                imgElement4.style.opacity = 0;
                imgElement5.style.opacity = 1;

                setTimeout(() => {
                    // Step 3: image5 표시 완료 → 영상 준비되면 즉시 재생
                    image5Shown = true;
                    playTransition();
                }, 100);
            }, 1000);
        };
    </script>
</head>
<body>
    <div class="image-container">
        <img id="image4" class="fade" alt="Image 4">
        <img id="image5" class="fade" alt="Image 5">

        <!-- 전환 영상: image5 마지막 프레임 → image0 첫 프레임 -->
        <video id="transition-video" muted playsinline preload="auto">
            <source src="transition.mp4" type="video/mp4">
            <source src="transition.webm" type="video/webm">
        </video>

        <img id="main-image" src="image.png" alt="Main Image">
    </div>
    <div class="change-image-button" onclick="changeImage(1)">⬅️</div>
    <div class="change-image-button" style="left: 5px;" onclick="changeImage(0)">➡️</div>
</body>
</html>
